version: 2

project_name: grype

release:
  prerelease: auto
  draft: false

env:
  # required to support multi-architecture docker builds
  - DOCKER_CLI_EXPERIMENTAL=enabled
  - CGO_ENABLED=0

builds:
  - id: linux-build
    dir: ./cmd/grype
    binary: grype
    goos:
      - linux
    goarch:
      # Full arch matrix matches the RapidFort Trivy fork's release surface —
      # covers 386/arm for legacy systems, amd64/arm64 for the majority, and
      # s390x/ppc64le for IBM enterprise targets. modernc.org/sqlite (via
      # glebarez/sqlite in go.mod) supports all six on linux.
      - "386"
      - arm
      - amd64
      - arm64
      - s390x
      - ppc64le
    goarm:
      - "7"
    # set the modified timestamp on the output binary to the git timestamp to ensure a reproducible build
    mod_timestamp: &build-timestamp '{{ .CommitTimestamp }}'
    ldflags: &build-ldflags |
      -w
      -s
      -extldflags '-static'
      -X main.version={{.Version}}
      -X main.gitCommit={{.Commit}}
      -X main.buildDate={{.Date}}
      -X main.gitDescription={{.Summary}}

  - id: freebsd-build
    dir: ./cmd/grype
    binary: grype
    goos:
      - freebsd
    goarch:
      # modernc.org/sqlite doesn't support freebsd/arm64.
      # freebsd/386 is no longer supported in modernc.org/libc.
      # See https://gitlab.com/cznic/libc/-/issues/45
      - amd64
    mod_timestamp: *build-timestamp
    ldflags: *build-ldflags

  - id: darwin-build
    dir: ./cmd/grype
    binary: grype
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: *build-timestamp
    ldflags: *build-ldflags
    hooks:
      post:
        # RapidFort fork: hard-code --ad-hoc=true so we never require an Apple
        # Developer ID cert (which anchore's QUILL_SIGN_P12 secret would provide
        # but we don't have). End-user Macs will show a Gatekeeper warning on
        # first run; right-click → Open works around it. For proper signing
        # later, buy a Developer ID ($99/yr), store the P12 as QUILL_SIGN_P12
        # in the release workflow, and change --ad-hoc back to {{ .IsSnapshot }}.
        - cmd: .tool/quill sign-and-notarize "{{ .Path }}" --dry-run={{ .IsSnapshot }} --ad-hoc=true -vv
          env:
            - QUILL_LOG_FILE=/tmp/quill-{{ .Target }}.log

  - id: windows-build
    dir: ./cmd/grype
    binary: grype
    goos:
      - windows
    goarch:
      # modernc.org/sqlite doesn't support windows/386 or windows/arm.
      - amd64
    mod_timestamp: *build-timestamp
    ldflags: *build-ldflags

archives:
  - id: archive
    formats: [tar.gz]
    # Humanized filenames: `grype_0.115.0-rf.1_Linux-64bit.tar.gz` matches the
    # convention used by the RapidFort Trivy fork so users of both scanners see
    # the same shape. Original grype convention was `grype_0.115.0-rf.1_linux_amd64.tar.gz`.
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else if eq .Os "linux" }}Linux
      {{- else if eq .Os "freebsd" }}FreeBSD
      {{- else if eq .Os "windows" }}Windows
      {{- else }}{{ .Os }}{{ end }}-
      {{- if eq .Arch "amd64" }}64bit
      {{- else if eq .Arch "386" }}32bit
      {{- else if eq .Arch "arm" }}ARM
      {{- else if eq .Arch "arm64" }}ARM64
      {{- else if eq .Arch "ppc64le" }}PPC64LE
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE
      - templates/*.tmpl
    format_overrides:
      - goos: windows
        formats: [zip]

nfpms:
  - license: "Apache-2.0"
    maintainer: "RapidFort"
    vendor: "RapidFort"
    homepage: "https://github.com/rfJanit/grype"
    description: "RapidFort's Grype fork — A vulnerability scanner for container images and filesystems, extended with RapidFort curated advisories."
    formats:
      - rpm
      - deb
    file_name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else if eq .Os "linux" }}Linux
      {{- else if eq .Os "freebsd" }}FreeBSD
      {{- else }}{{ title .Os }}{{ end }}-
      {{- if eq .Arch "amd64" }}64bit
      {{- else if eq .Arch "386" }}32bit
      {{- else if eq .Arch "arm" }}ARM
      {{- else if eq .Arch "arm64" }}ARM64
      {{- else if eq .Arch "ppc64le" }}PPC64LE
      {{- else }}{{ .Arch }}{{ end }}
    # Ship the output-format templates so `grype -o template -t <path>` works
    # out of the box for anyone who installed via .deb/.rpm.
    contents:
      - src: templates/*.tmpl
        dst: /usr/local/share/grype/templates
    # RPM signing intentionally omitted — no signing key configured for the first release.

# Per-arch container images pushed only to GHCR under the fork's owner.
# Docker Hub removed for the first release; add back later if a rapidfort/grype
# repo is created with DOCKERHUB_USERNAME/TOKEN secrets in the release workflow.
#
# Only production images ship — -nonroot and -debug variants dropped for first
# release (add back on request if users need PodSecurityPolicy-friendly image
# or in-container shell tools).
#
# Note: grype's Dockerfile has hardcoded LABELs including image.vendor="Anchore, Inc."
# and a generic image.description. The `--label=` flags below override these at build
# time — docker takes the latest label with a matching key. To fix at the source
# instead of overriding, edit the LABEL directives in grype/Dockerfile directly.
dockers:
  - image_templates:
      - "ghcr.io/rfjanit/grype:{{ .Version }}-amd64"
      - "ghcr.io/rfjanit/grype:latest-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    ids:
      - linux-build
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--provenance=false"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=RapidFort's Grype fork with curated advisories"
      - "--label=org.opencontainers.image.vendor=RapidFort"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/rfJanit/grype"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.url=https://github.com/rfJanit/grype"
      # Grype's Dockerfile has ARG BUILD_DATE / BUILD_VERSION / VCS_REF / VCS_URL
      # that populate additional LABELs. Missing --build-arg's would leave those
      # labels empty; not fatal but visually ugly on `docker inspect`.
      - "--build-arg=BUILD_DATE={{.Date}}"
      - "--build-arg=BUILD_VERSION={{.Version}}"
      - "--build-arg=VCS_REF={{.FullCommit}}"
      - "--build-arg=VCS_URL={{.GitURL}}"

  - image_templates:
      - "ghcr.io/rfjanit/grype:{{ .Version }}-arm64"
      - "ghcr.io/rfjanit/grype:latest-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    ids:
      - linux-build
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--provenance=false"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=RapidFort's Grype fork with curated advisories"
      - "--label=org.opencontainers.image.vendor=RapidFort"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/rfJanit/grype"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.url=https://github.com/rfJanit/grype"
      - "--build-arg=BUILD_DATE={{.Date}}"
      - "--build-arg=BUILD_VERSION={{.Version}}"
      - "--build-arg=VCS_REF={{.FullCommit}}"
      - "--build-arg=VCS_URL={{.GitURL}}"

  - image_templates:
      - "ghcr.io/rfjanit/grype:{{ .Version }}-s390x"
      - "ghcr.io/rfjanit/grype:latest-s390x"
    use: buildx
    goos: linux
    goarch: s390x
    ids:
      - linux-build
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/s390x"
      - "--provenance=false"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=RapidFort's Grype fork with curated advisories"
      - "--label=org.opencontainers.image.vendor=RapidFort"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/rfJanit/grype"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.url=https://github.com/rfJanit/grype"
      - "--build-arg=BUILD_DATE={{.Date}}"
      - "--build-arg=BUILD_VERSION={{.Version}}"
      - "--build-arg=VCS_REF={{.FullCommit}}"
      - "--build-arg=VCS_URL={{.GitURL}}"

  - image_templates:
      - "ghcr.io/rfjanit/grype:{{ .Version }}-ppc64le"
      - "ghcr.io/rfjanit/grype:latest-ppc64le"
    use: buildx
    goos: linux
    goarch: ppc64le
    ids:
      - linux-build
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/ppc64le"
      - "--provenance=false"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=RapidFort's Grype fork with curated advisories"
      - "--label=org.opencontainers.image.vendor=RapidFort"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/rfJanit/grype"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.url=https://github.com/rfJanit/grype"
      - "--build-arg=BUILD_DATE={{.Date}}"
      - "--build-arg=BUILD_VERSION={{.Version}}"
      - "--build-arg=VCS_REF={{.FullCommit}}"
      - "--build-arg=VCS_URL={{.GitURL}}"

# Multi-arch manifests published only to GHCR under the fork's owner.
# End users pull one of:
#   docker pull ghcr.io/rfjanit/grype:latest          # newest release
#   docker pull ghcr.io/rfjanit/grype:0.115.0-rf.1    # pinned version
# The daemon picks the arch that matches its host.
docker_manifests:
  - name_template: 'ghcr.io/rfjanit/grype:{{ .Version }}'
    image_templates:
      - 'ghcr.io/rfjanit/grype:{{ .Version }}-amd64'
      - 'ghcr.io/rfjanit/grype:{{ .Version }}-arm64'
      - 'ghcr.io/rfjanit/grype:{{ .Version }}-s390x'
      - 'ghcr.io/rfjanit/grype:{{ .Version }}-ppc64le'

  - name_template: 'ghcr.io/rfjanit/grype:latest'
    image_templates:
      - 'ghcr.io/rfjanit/grype:{{ .Version }}-amd64'
      - 'ghcr.io/rfjanit/grype:{{ .Version }}-arm64'
      - 'ghcr.io/rfjanit/grype:{{ .Version }}-s390x'
      - 'ghcr.io/rfjanit/grype:{{ .Version }}-ppc64le'

# Cosign keyless signing of the checksums file. Works with GitHub's OIDC
# provider — no external secrets needed, but the release workflow MUST
# declare `permissions: id-token: write` (§3.2 of RELEASE-GUIDE-GRYPE.md).
# This is one place where the Grype fork diverges from the Trivy fork: Trivy
# disabled signing for the first release; Grype keeps it since it's zero-cost
# once the workflow permission is in place.
signs:
  - cmd: .tool/cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--use-signing-config=false"
      - "--oidc-issuer=https://token.actions.githubusercontent.com"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
