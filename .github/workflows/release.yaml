name: "Release"

permissions: {}

# there should never be two releases in progress at the same time
concurrency:
  group: release
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      version:
        description: tag the latest commit on main with the given version (prefixed with v)
        required: true
      skip-checks:
        description: skip the check-gate (release even if checks haven't passed on main)
        type: boolean
        default: false
        required: false

jobs:
  version-available:
    permissions:
      contents: read # for the most recent tags
    uses: anchore/workflows/.github/workflows/check-version-available.yaml@7212994dc8fc3a53fe9c8e766ab5b4ddd16ea3d4 # v0.8.0
    with:
      version: ${{ github.event.inputs.version }}

  check-gate:
    if: ${{ !inputs.skip-checks }}
    permissions:
      contents: read
      checks: read # required for getting the status of specific check names
    uses: anchore/workflows/.github/workflows/check-gate.yaml@b0c30a80409130d329aaa356fd64a34d8c0b3375 # v0.7.2
    with:
      # these are checks that should be run on pull-request and merges to main.
      # we do NOT want to kick off a release if these have not been verified on main.
      # Please see the validations.yaml workflow for the names that should be used here.
      checks: '["Acceptance tests (Linux)", "Acceptance tests (Mac)", "Build snapshot artifacts", "CLI tests (Linux)", "Integration tests", "Quality tests", "Static analysis", "Unit tests"]'

  # only release core assets within the "release" job. Any other assets not already under the purview of the
  # goreleaser configuration should be added as separate jobs to allow for debugging separately from the release workflow
  # as well as not accidentally be re-run as a step multiple times (as could be done within the release workflow) as
  # not all actions are guaranteed to be idempotent.
  release:
    needs: [check-gate, version-available]
    # run even when check-gate is skipped, but never when version-available
    # failed/was skipped, nor when check-gate failed or was cancelled. note:
    # always() disables the implicit success() gate on ALL needs, so the
    # version-available requirement must be re-asserted explicitly here.
    if: >-
      ${{ always()
          && needs.version-available.result == 'success'
          && !contains(fromJSON('["failure", "cancelled"]'), needs.check-gate.result) }}
    environment: release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap
        with:
          # use the same cache we used for building snapshots
          cache-key-prefix: "snapshot"

      # RapidFort fork: Docker Hub login removed. .goreleaser.yaml only pushes
      # images to ghcr.io/rfjanit/grype (not docker.io/anchore/grype), so no
      # Docker Hub credentials are needed. If a rapidfort/grype Docker Hub org
      # is set up later, restore this step and store DOCKERHUB_USERNAME +
      # DOCKERHUB_TOKEN as workflow secrets on the fork.

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & publish release artifacts
        run: make ci-release
        env:
          # For pushing the release tag. Anchore's original config used a
          # dedicated TAG_TOKEN, but since this workflow has `contents: write`
          # at the job level, GITHUB_TOKEN is sufficient for tag push.
          TAG_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ github.event.inputs.version }}
          # For creating the GitHub release (needs contents + packages write,
          # both declared in the job's `permissions:` block above).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          #
          # RapidFort fork: intentionally NOT passing these env vars:
          #   QUILL_SIGN_P12 / _PASSWORD             — macOS ad-hoc signing hardcoded in .goreleaser.yaml,
          #   QUILL_NOTARY_ISSUER / _KEY_ID / _KEY     no Apple Developer ID needed. (§3.1)
          #   GITHUB_BREW_TOKEN                      — homebrew_casks block removed from .goreleaser.yaml. (§3.1)
          # Re-add these if you buy an Apple Developer ID for real macOS
          # signing (change .goreleaser.yaml's --ad-hoc=true first) or set
          # up a rfJanit/homebrew-grype tap.

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        continue-on-error: true
        with:
          artifact-name: sbom.spdx.json

  # RapidFort fork: `release-install-script` job removed.
  #
  # Upstream uploads their `install.sh` to Cloudflare R2 (get.anchore.io/grype)
  # and AWS S3 buckets using OSS_R2_* / TOOLBOX_* secrets — infrastructure your
  # fork doesn't have. End users install RapidFort's grype via one of:
  #   - `docker pull ghcr.io/rfjanit/grype:latest`
  #   - GitHub Releases tarball / .deb / .rpm (attached to each tag)
  #
  # If you want a curl-pipe installer later:
  # 1. Set up your own R2 or S3 bucket for hosting the install script.
  # 2. Store the corresponding credentials as workflow secrets.
  # 3. Restore this job with `rfJanit/workflows` (or a similar own-repo reusable
  #    workflow) instead of `anchore/workflows`, since the anchore reusable
  #    workflow may hardcode assumptions about anchore's bucket naming.
